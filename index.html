<title>Zain Khan — My Google Universe</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#bcc9d8;
  min-height:100vh;overflow:hidden;
  font-family:'Google Sans',ui-sans-serif,sans-serif;
}

/* ── BACKGROUND ICON GRID ───────────────────────── */
#bg-grid{
  position:fixed;inset:0;
  display:grid;
  grid-template-columns:repeat(20,1fr);
  gap:0;
  opacity:0.18;
  filter:blur(2px) saturate(0.6);
  animation:bg-drift 60s linear infinite;
  pointer-events:none;z-index:0;
  transform:scale(1.1);
}
@keyframes bg-drift{0%{transform:scale(1.1) translateX(0)}100%{transform:scale(1.1) translateX(-72px)}}
#bg-grid img{width:100%;aspect-ratio:1;object-fit:contain;padding:4px;opacity:0.8}

/* ── ATOM SCENE ────────────────────────────────── */
#atom-scene{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:1;pointer-events:none;
}
#atom-wrap{
  position:relative;width:800px;height:800px;flex-shrink:0;
  pointer-events:none;
}

/* ── SVG ORBITS ────────────────────────────────── */
#orbit-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
  overflow:visible;
}
.orbit-ring{
  fill:none;
  stroke:rgba(255,255,255,0.75);
  stroke-width:2.5;
}
.orbit-outer{
  fill:none;stroke:rgba(255,255,255,0.12);stroke-width:1.5;
}
.orbit-trail{
  fill:none;stroke-linecap:round;stroke-width:4;
  opacity:0;transition:opacity .3s;
}

/* ── NUCLEUS ───────────────────────────────────── */
#nucleus{
  position:absolute;
  width:150px;height:150px;
  left:400px;top:400px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:#fff;
  box-shadow:
    0 0 0 6px rgba(255,255,255,0.25),
    0 0 60px rgba(255,255,255,0.18),
    0 0 120px rgba(100,150,255,0.1);
  display:flex;align-items:center;justify-content:center;
  z-index:15;pointer-events:none;
}
#nucleus img{width:100px;height:100px;object-fit:contain}

/* ── ORBIT NODES ───────────────────────────────── */
#icon-container{
  position:absolute;inset:0;pointer-events:none;
}
.orbit-node{
  position:absolute;
  width:56px;height:56px;
  border-radius:14px;
  background:#fff;
  box-shadow:0 4px 20px rgba(0,0,0,0.22),0 1px 4px rgba(0,0,0,0.1);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transform:translate(-50%,-50%);
  pointer-events:all;
  transition:box-shadow .2s;
}
.orbit-node:hover{
  box-shadow:0 8px 32px rgba(0,0,0,0.35),0 0 0 2.5px rgba(255,255,255,0.8);
}
.orbit-node.active{
  box-shadow:0 0 0 3px var(--nc),0 8px 32px rgba(0,0,0,0.4) !important;
}
.orbit-node img{width:38px;height:38px;object-fit:contain;border-radius:8px}
.orbit-node .node-label{
  position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.6);color:#fff;
  font-size:10px;padding:2px 8px;border-radius:10px;
  white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;
}
.orbit-node:hover .node-label{opacity:1}

/* ── NAV ───────────────────────────────────────── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;height:56px;
  background:rgba(160,180,205,0.5);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,255,255,0.25);
}
.nav-brand{
  font-size:15px;font-weight:600;
  color:rgba(255,255,255,0.95);letter-spacing:.01em;
}
.nav-stats{
  display:flex;gap:24px;font-size:13px;
  color:rgba(255,255,255,0.65);
}
.nav-stats strong{color:#fff;font-weight:600}
.nav-hint{
  font-size:12px;color:rgba(255,255,255,0.5);
  letter-spacing:.03em;
}

/* ── DETAIL PANEL ──────────────────────────────── */
.panel-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:500;opacity:0;pointer-events:none;transition:.25s;
}
.panel-overlay.show{opacity:1;pointer-events:all}
.detail-panel{
  position:fixed;top:0;right:0;bottom:0;width:min(520px,100vw);
  background:#fff;z-index:600;
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow:-12px 0 60px rgba(0,0,0,.2);
}
.detail-panel.show{transform:translateX(0)}

/* Panel Header */
.panel-header{
  padding:20px 24px 16px;
  border-bottom:1px solid #E8EAED;
  display:flex;align-items:center;gap:16px;

.panel-logo{

.panel-title{font-size:20px;font-weight:700;color:#202124;margin-bottom:3px}
.panel-domain{font-size:13px;color:#5F6368}
.panel-close{

  font-size:20px;color:#5F6368;cursor:pointer;
  padding:8px;border-radius:50%;line-height:1;flex-shrink:0;
}
.panel-close:hover{background:#F1F3F4}

/* Panel Body */
.panel-body{flex:1;overflow-y:auto;padding:20px 24px 32px}
.category-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:20px;
  font-size:12px;font-weight:600;margin-bottom:18px;
}
.big-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px}
.big-stat{background:#F8F9FA;border-radius:14px;padding:16px}
.big-stat-n{font-size:26px;font-weight:700;margin-bottom:4px}
.big-stat-l{font-size:11px;color:#5F6368;text-transform:uppercase;letter-spacing:.05em}
.section-title{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:#5F6368;margin:20px 0 10px;
}
.topic-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:13px}
.topic-name{width:155px;flex-shrink:0;color:#202124;font-weight:500}
.topic-bar-wrap{flex:1;height:5px;background:#E8EAED;border-radius:3px;overflow:hidden}
.topic-bar{height:100%;border-radius:3px;width:0;transition:width .9s cubic-bezier(.22,1,.36,1)}
.topic-count{width:48px;text-align:right;color:#5F6368;font-size:12px}
.year-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:22px}
.year-card{
  background:#F8F9FA;border-radius:10px;padding:10px 6px;
  text-align:center;cursor:pointer;transition:.15s;border:1.5px solid #E8EAED;
}
.year-card:hover{border-color:#4285F4;background:#E8F0FE}
.year-n{font-size:15px;font-weight:700;margin-bottom:2px}
.year-l{font-size:10px;color:#5F6368;margin-bottom:6px}
.year-bar-mini{height:3px;background:#E8EAED;border-radius:2px;overflow:hidden}
.year-bar-mini-fill{height:100%;width:0;border-radius:2px;transition:width .9s cubic-bezier(.22,1,.36,1)}
.links-grid{display:flex;flex-direction:column;gap:8px}
.link-card{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-radius:10px;border:1.5px solid #E8EAED;
  text-decoration:none;color:#202124;transition:.15s;background:#fff;
}
.link-card:hover{border-color:#4285F4;box-shadow:0 2px 10px rgba(66,133,244,.15)}

.tooltip{

  opacity:0;transition:opacity .15s;
  transform:translateX(-50%);
  white-space:nowrap;
  backdrop-filter:blur(8px);
}
.tooltip.show{opacity:1}

/* ════════════════════════════════════════════
   ORBIT CONFIG
   Each orbit: rx=semi-major, ry=semi-minor (b = a*sin(tilt))
   angle = rotation of the ellipse major axis (degrees)
   The 3 orbits at 0°, 60°, -60° give the atom model look
════════════════════════════════════════════ */
const CX = 400, CY = 400;

  { rx:285, ry:74, angle:0,    speed:0.42, color:'rgba(255,255,255,0.8)' },

];

/* ════════════════════════════════════════════
   POSITION MATH
   Projects 3D circular orbit (tilted at angle from horizontal)
   into 2D screen coordinates.

   For orbit with:
     a = semi-major (screen rx)
     b = semi-minor = a * sin(tilt)
   where tilt ≈ arcsin(ry/rx)

   Position on orbit at angle θ, rotated by α:
     lx = a * cos(θ)
     ly = b * sin(θ)
     x = cx + lx*cos(α) - ly*sin(α)
     y = cy + lx*sin(α) + ly*cos(α)

   Depth (z): positive = in front of nucleus
     depth = sqrt(a²-b²) * sin(θ+α_component)
     simplified: depth = sqrt(a²-b²) * sin(θ) * cos(α) + ...
     We use: depth = a * sin(θ) * cos(α) + b * cos(θ) * sin(α) [approx]
════════════════════════════════════════════ */
function getPos(orbitIdx, theta){
  const {rx, ry, angle} = ORBIT_DEFS[orbitIdx];
  const α = angle * Math.PI / 180;
  const lx = rx * Math.cos(theta);
  const ly = ry * Math.sin(theta);
  const x = CX + lx * Math.cos(α) - ly * Math.sin(α);
  const y = CY + lx * Math.sin(α) + ly * Math.cos(α);
  // Depth: sqrt(rx²-ry²) gives the 3D radius component in Z
  // When sin(θ) is positive and we're on the "near" side
  const dz = Math.sqrt(rx*rx - ry*ry);
  const depth = dz * Math.sin(theta);
  return {x, y, depth};
}

function buildBgGrid(){
  const grid = document.getElementById('bg-grid');
  const count = 260;
  for(let i=0;i<count;i++){
    const img = document.createElement('img');
    img.src = BG_ICONS[i % BG_ICONS.length];
    img.alt = '';
    img.loading = 'lazy';
    grid.appendChild(img);
  }
}

/* ════════════════════════════════════════════
   BUILD ORBIT RINGS (SVG)
════════════════════════════════════════════ */
function buildOrbitRings(){
  const ringsEl = document.getElementById('orbit-rings');
  ORBIT_DEFS.forEach(({rx, ry, angle}) => {
    const el = document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    el.setAttribute('cx', CX);
    el.setAttribute('cy', CY);
    el.setAttribute('rx', rx);
    el.setAttribute('ry', ry);
    el.setAttribute('transform', `rotate(${angle},${CX},${CY})`);
    el.classList.add('orbit-ring');
    ringsEl.appendChild(el);
  });
}

/* ════════════════════════════════════════════
   BUILD ICON NODES
════════════════════════════════════════════ */
function buildIconNodes(){
  const container = document.getElementById('icon-container');
  const trailsEl = document.getElementById('orbit-trails');

  ORBIT_PRODUCTS.forEach((prods, orbitIdx) => {
    prods.forEach((name, i) => {
      const prod = findProduct(name);
      if(!prod) return;
      const cat = findCategoryForProduct(prod);

      // Initial angle: evenly spaced + small random offset
      const theta = (2 * Math.PI / prods.length) * i + (orbitIdx * 0.8);

      // DOM node
      const node = document.createElement('div');
      node.className = 'orbit-node';
      node.style.setProperty('--nc', cat.color);
      node.innerHTML = `
        <img src="${prod.icon}" alt="${prod.name}">
        <div class="node-label">${prod.name}</div>
      `;
      node.addEventListener('click', () => handleNodeClick(nodeObj));
      container.appendChild(node);

      // SVG trail (arc that follows the icon)
      const trail = document.createElementNS('http://www.w3.org/2000/svg','path');
      trail.classList.add('orbit-trail');
      trail.style.stroke = cat.color;
      trail.style.strokeWidth = '4';
      trail.style.opacity = '0';
      trailsEl.appendChild(trail);

      const nodeObj = {
        el: node,
        trail,
        orbit: orbitIdx,
        theta,
        speed: ORBIT_DEFS[orbitIdx].speed * (0.85 + Math.random()*0.3),
        prod,
        cat,
        paused: false,
        trailHistory: [],
      };
      nodes.push(nodeObj);
    });
  });
}

/* ════════════════════════════════════════════
   TRAIL ARC
════════════════════════════════════════════ */
function updateTrail(node){
  const hist = node.trailHistory;
  if(hist.length < 2) return;

  // Draw a polyline through recent positions
  const pts = hist.slice(-18);
  let d = `M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++) d += ` L${pts[i].x},${pts[i].y}`;

  node.trail.setAttribute('d', d);
  node.trail.style.opacity = node.paused ? '0' : '0.6';
  node.trail.style.strokeWidth = '4';
}

/* ════════════════════════════════════════════
   ANIMATION LOOP
════════════════════════════════════════════ */
function animate(ts){
  const dt = lastT ? Math.min((ts - lastT) / 1000, 0.05) : 0;
  lastT = ts;

  // Advance non-paused nodes
  nodes.forEach(node => {
    if(!node.paused){
      node.theta += node.speed * dt;

      const pos = getPos(node.orbit, node.theta);
      node.trailHistory.push({x: pos.x, y: pos.y});
      if(node.trailHistory.length > 28) node.trailHistory.shift();
    }
  });

  // Sort all nodes by depth (back to front for correct rendering order)
  const sorted = [...nodes].sort((a,b) => {
    const da = getPos(a.orbit, a.theta).depth;
    const db = getPos(b.orbit, b.theta).depth;
    return da - db;
  });

  // Update DOM positions
  sorted.forEach((node, renderIdx) => {
    const pos = getPos(node.orbit, node.theta);
    node.el.style.left = pos.x + 'px';
    node.el.style.top  = pos.y + 'px';

    // Z-index: nodes behind nucleus (depth<0) get zIndex 5, in front get 20
    const zBase = pos.depth > 0 ? 20 : 5;
    node.el.style.zIndex = node.paused ? 25 : zBase;

    // Slight scale by depth for parallax feel
    if(!node.paused){
      const s = 1 + (pos.depth / 350) * 0.12;
      node.el.style.transform = `translate(-50%,-50%) scale(${s.toFixed(3)})`;
    }

    // Update trail
    updateTrail(node);
  });

  rafId = requestAnimationFrame(animate);
}

/* ════════════════════════════════════════════
   INTERACTION
════════════════════════════════════════════ */
function handleNodeClick(node){
  if(activeNode && activeNode !== node){
    // Deactivate previous
    activeNode.paused = false;
    activeNode.el.classList.remove('active');
    activeNode.trailHistory = [];
  }

  if(activeNode === node){
    // Clicking active node → close panel
    closePanel();
    return;
  }

  // Activate node
  node.paused = true;
  node.el.classList.add('active');
  activeNode = node;

  openPanel(node.prod, node.cat);
}

function closePanel(){
  document.getElementById('detail-panel').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');

  if(activeNode){
    activeNode.paused = false;
    activeNode.el.classList.remove('active');
    activeNode.trailHistory = [];
    activeNode = null;
  }
}

/* ════════════════════════════════════════════
   PANEL
════════════════════════════════════════════ */
function openPanel(prod, cat){
  document.getElementById('panel-logo').src = prod.icon;
  document.getElementById('panel-logo').style.background = cat.color + '18';
  document.getElementById('panel-title').textContent = prod.name;
  document.getElementById('panel-domain').textContent = prod.host;

  const totalLinks = prod.links;
  const topYear = Object.entries(prod.years).sort((a,b)=>b[1]-a[1])[0];
  const maxYearVal = Math.max(...Object.values(prod.years));

  document.getElementById('panel-body').innerHTML = `
    <span class="category-chip" style="background:${cat.color}18;color:${cat.textColor}">
      <span style="width:8px;height:8px;border-radius:50%;background:${cat.color};display:inline-block"></span>
      ${cat.label}
    </span>

    <div class="big-stats">
      <div class="big-stat">
        <div class="big-stat-n" style="color:${cat.color}">${totalLinks.toLocaleString()}</div>
        <div class="big-stat-l">Total Links</div>
      </div>
      <div class="big-stat">
        <div class="big-stat-n" style="color:${cat.color}">${topYear[0]}</div>
        <div class="big-stat-l">Peak Year &middot; ${topYear[1]} links</div>
      </div>
    </div>

    <div class="section-title">Top Topics</div>
    <div style="margin-bottom:4px">
      ${prod.topics.map((t,i)=>{
        const pct = Math.round(100 - i*18);
        const cnt = Math.round(totalLinks*(pct/100*0.35));
        return `<div class="topic-row">
          <div class="topic-name">${t}</div>
          <div class="topic-bar-wrap">
            <div class="topic-bar" style="background:${cat.color}" data-w="${pct}"></div>
          </div>
          <div class="topic-count">${cnt.toLocaleString()}</div>
        </div>`;
      }).join('')}
    </div>

    <div class="section-title">Activity by Year</div>
    <div class="year-grid">
      ${Object.entries(prod.years).map(([yr,cnt])=>`
        <div class="year-card">
          <div class="year-n" style="color:${cat.color}">${cnt}</div>
          <div class="year-l">${yr}</div>
          <div class="year-bar-mini">
            <div class="year-bar-mini-fill" style="background:${cat.color}" data-w="${Math.round(cnt/maxYearVal*100)}"></div>
          </div>
        </div>`).join('')}
    </div>

    <div class="section-title">Explore Links</div>
    <div class="links-grid">
      ${generateLinks(prod).map(l=>`
        <a class="link-card" href="${l.url}" target="_blank" rel="noopener">
          <img class="link-card-icon" src="${prod.icon}" alt="">
          <span class="link-card-text">${l.label}</span>
          <span class="link-card-arrow">&#8599;</span>
        </a>`).join('')}
    </div>
  `;

  document.getElementById('detail-panel').classList.add('show');
  document.getElementById('overlay').classList.add('show');

  // Animate bars after paint
  setTimeout(()=>{
    document.querySelectorAll('[data-w]').forEach(el=>{
      el.style.width = el.dataset.w + '%';
    });
  }, 60);
}

function generateLinks(prod){
  const base = `https://${prod.host}`;
  return [
    {label:`Open ${prod.name}`, url: base},
    {label:`Recent activity on ${prod.domain}`, url:`https://myactivity.google.com/?product=${encodeURIComponent(prod.name)}`},
    {label:`Search history for ${prod.domain}`, url:`https://myactivity.google.com/`},
    {label:`Help & Support`, url:`https://support.google.com/`},
  ];
}

════════════════════════════════════════════ */
const tipEl = document.getElementById('tooltip');
document.addEventListener('mousemove', e=>{
  tipEl.style.left = e.clientX+'px';
  tipEl.style.top  = (e.clientY - 42)+'px';
});
nodes.forEach(n=>{
  n.el.addEventListener('mouseenter',()=>{
    tipEl.textContent = n.prod.name;
    tipEl.classList.add('show');
  });
  n.el.addEventListener('mouseleave',()=>{
    tipEl.classList.remove('show');
  });
});

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
buildBgGrid();
buildOrbitRings();
buildIconNodes();

// Re-attach tooltip listeners (nodes built after initial definition)
nodes.forEach(n=>{
  n.el.addEventListener('mouseenter',()=>{
    tipEl.textContent = n.prod.name;
    tipEl.classList.add('show');
  });
  n.el.addEventListener('mouseleave',()=>tipEl.classList.remove('show'));
});

requestAnimationFrame(animate);
</script>
